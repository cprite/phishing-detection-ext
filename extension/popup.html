<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extension Toggle</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 10px;
      text-align: center;
      width: 260px;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #2196F3;
    }

    input:focus + .slider {
      box-shadow: 0 0 1px #2196F3;
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }

    .footer {
      margin-top: 20px;
      font-size: 0.8em;
      text-align: center;
    }

    .footer a {
      color: #0000EE;
      text-decoration: none;
    }

    .trusted {
      margin-top: 18px;
      text-align: left;
      border-top: 1px solid #e0e0e0;
      padding-top: 12px;
    }

    .trusted h2 {
      font-size: 0.85em;
      color: #444;
      margin: 0 0 8px;
      text-align: center;
    }

    #trustedEmpty {
      font-size: 0.78em;
      color: #999;
      text-align: center;
      margin: 4px 0;
    }

    #trustedList {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 160px;
      overflow-y: auto;
    }

    #trustedList li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.82em;
      padding: 4px 6px;
      border-radius: 4px;
    }

    #trustedList li:nth-child(odd) {
      background-color: #f5f5f5;
    }

    #trustedList .host {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 8px;
    }

    #trustedList .remove {
      flex: none;
      border: none;
      background: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 1em;
      line-height: 1;
      padding: 2px 4px;
    }

    #trustedList .remove:hover {
      color: #c0392b;
    }

    .oss {
      margin-top: 18px;
      border-top: 1px solid #e0e0e0;
      padding-top: 12px;
    }

    .oss h2 {
      font-size: 0.85em;
      color: #444;
      margin: 0 0 8px;
    }

    .oss-btn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin: 6px 0;
      padding: 8px 10px;
      font-size: 0.85em;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      color: #fff;
      background-color: #e74c3c;
    }

    .oss-btn.secondary {
      background-color: #34495e;
    }

    .oss-btn:hover {
      filter: brightness(0.92);
    }

    #feedbackStatus {
      font-size: 0.78em;
      color: #2c7;
      min-height: 1em;
      margin: 6px 0 0;
    }

    .stats {
      margin-top: 12px;
      text-align: left;
      font-size: 0.8em;
      color: #444;
    }

    .stats h3 {
      font-size: 0.85em;
      color: #444;
      margin: 0 0 6px;
      text-align: center;
    }

    .stats .row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
    }

    .stats .row b {
      font-weight: 600;
      color: #222;
    }
  </style>
</head>
<body>
  <label class="switch">
    <input type="checkbox" id="toggleSwitch">
    <span class="slider"></span>
  </label>

  <div class="trusted">
    <h2>Trusted sites</h2>
    <p id="trustedEmpty">No trusted sites yet.</p>
    <ul id="trustedList"></ul>
  </div>

  <div class="oss" id="ossSection" style="display:none">
    <h2>Self-learning (open-source build)</h2>
    <button id="markPhishingBtn" class="oss-btn">Mark this site as phishing</button>
    <p id="feedbackStatus"></p>

    <div class="stats" id="statsBlock">
      <h3>Model stats</h3>
      <div class="row"><span>Last updated:</span> <b id="statUpdated">—</b></div>
      <div class="row"><span>Feedback points:</span> <b id="statCount">0</b></div>
      <div class="row"><span>Accuracy (on feedback):</span> <b id="statAcc">—</b></div>
    </div>
  </div>

  <div class="footer">
    <p>Disclaimer: This extension is for educational purposes only.</p>
    <p>Author: <a href="https://github.com/cprite" target="_blank">cprite</a></p>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
